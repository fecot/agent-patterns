# business-agent-training-lab のローカル開発用 Docker Compose。
# `docker compose up --build` で web/api/worker/postgres/redis/minio が起動する。
#
# 学習リポジトリのため、各 app コンテナは「イメージ内に依存を install し、
# 実行時は src ディレクトリだけを bind mount して hot reload する」方針。
# こうすると pnpm の symlink 構造を壊さずにコード変更を即反映できる。

services:
  postgres:
    # pgvector 拡張入りの公式イメージ。RAG (Phase 5) で使う VECTOR 型を最初から有効化できる。
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_training
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_training"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - miniodata:/data

  # 起動直後に generated-files バケットを作成する一回限りのコンテナ。
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/generated-files;
      echo 'minio bucket ready';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./data:/app/data

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./data:/app/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # Vite dev server が /api を API コンテナへプロキシするための向き先。
      API_PROXY: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/index.html:/app/apps/web/index.html
      - ./apps/web/vite.config.ts:/app/apps/web/vite.config.ts

volumes:
  pgdata:
  miniodata:
